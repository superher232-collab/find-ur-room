<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#0b1534" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    
    <!-- Accent Blue Gradient -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>

    <!-- Glowing Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Outer Maskable Area Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Elegant Decorative Circular Grid -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#1e293b" stroke-width="2" stroke-dasharray="8 8" opacity="0.4" />
  <circle cx="256" cy="256" r="160" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.5" />
  <circle cx="256" cy="256" r="110" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.15" />

  <!-- Dotted Connection Path (Graph Nodes Mockup) -->
  <path d="M160,350 L256,260 L352,350" fill="none" stroke="#1e293b" stroke-width="4" stroke-dasharray="6 6" opacity="0.5" />
  <circle cx="160" cy="350" r="8" fill="#475569" />
  <circle cx="352" cy="350" r="8" fill="#475569" />

  <!-- Main Pin Container Glow -->
  <g filter="url(#glow)">
    <!-- Interconnecting Glowing Path Line -->
    <path d="M256,120 L256,260" fill="none" stroke="#3b82f6" stroke-width="6" opacity="0.8" />
    
    <!-- Outer Glow for Location Pin -->
    <path d="M256,90 C180,90 120,150 120,226 C120,320 256,420 256,420 C256,420 392,320 392,226 C392,150 332,90 256,90 Z" 
          fill="url(#blue-grad)" />
          
    <!-- Inner White Core for location dot -->
    <circle cx="256" cy="210" r="40" fill="#ffffff" />
    <circle cx="256" cy="210" r="20" fill="#1d4ed8" />
  </g>

  <!-- Elegant Floating Sparkles / GPS Signals -->
  <circle cx="130" cy="160" r="6" fill="#3b82f6" opacity="0.8" />
  <circle cx="370" cy="150" r="4" fill="#60a5fa" opacity="0.7" />
  <circle cx="220" cy="380" r="5" fill="#10b981" opacity="0.9" /> <!-- Snapped/Verified green indicator -->
</svg>
